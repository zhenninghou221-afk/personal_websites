<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>侯振宁的网站</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="welcome-screen">
        <h1 class="welcome-text">欢迎来到我的WEB</h1>
    </section>

    <div id="main-content">



        <main>
            <section id="intro">
                <h2>个人介绍</h2>
                <img src="images/avatar.jpg" alt="个人头像" class="avatar-image">
                <p class="intro-text">Edmond Dantès</p>
            </section>

            <section id="video">
                <h2>法拉利</h2>
                <div class="video-container">
                    <video controls muted class="video-player" id="autoplay-video">
                        <source src="videos/011.mp4" type="video/mp4">
                        您的浏览器不支持视频播放。
                    </video>
                    <button id="mute-button" class="video-control-button">
                        <!-- Icon will be added via CSS -->
                    </button>
                </div>
            </section>

            <section id="article-paris" class="article-section">
                <div class="article-content">
                    <h3>ferrari-f80</h3>

                    <a href="page/paris.html" class="article-button">阅读更多</a>
                </div>
            </section>
            <section id="article-qingdao" class="article-section">
                <div class="article-content">
                    <h3>ctr-ferrari-458</h3>
                    <a href="page/qingdao-trip.html" class="article-button">阅读更多</a>
                </div>
            </section>

            <section id="article-9112" class="article-section">
                <!-- This section is for the full-screen image -->
            </section>
        </main>

        <footer>
            <p id="copyright">&copy; 2026 您的名字. 保留所有权利.</p>
        </footer>
    </div>



    <script>
        document.getElementById('copyright').innerHTML = `&copy; ${new Date().getFullYear()} 您的名字. 保留所有权利.`;
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('autoplay-video');
            const muteButton = document.getElementById('mute-button');

            muteButton.addEventListener('click', () => {
                video.muted = !video.muted;
                muteButton.classList.toggle('is-unmuted');
            });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.target.id === 'autoplay-video') {
                        if (entry.isIntersecting) {
                            video.play();
                        } else {
                            video.pause();
                        }
                    } else {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('is-visible');
                        } else {
                            entry.target.classList.remove('is-visible');
                        }
                    }
                });
            }, {
                threshold: 0.5 // Trigger when 50% of the element is visible
            });

            const targets = document.querySelectorAll('section');
            targets.forEach(target => {
                observer.observe(target);
            });
            observer.observe(video);
        });
    </script>

</body>
</html>
