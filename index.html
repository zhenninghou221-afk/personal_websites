<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人品牌官网</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <header>
        <h1>个人品牌官网</h1>
        <nav>
            <a href="#intro">个人介绍</a>
            <a href="#video">个人视频</a>
            <a href="#articles">文章</a>
            <a href="#portfolio">作品展示</a>
        </nav>
    </header>

    <main>
        <section id="intro">
            <h2>个人介绍</h2>
            <img src="images/avatar.jpg" alt="个人头像" class="placeholder-image">
            <p>这里是您的个人介绍。您可以在这里详细描述您的背景、技能和职业目标。这段文字应该简洁而有力，突出您的核心优势和独特价值。</p>
        </section>

        <section id="video">
            <h2>个人视频</h2>
            <div class="video-placeholder">
                <p>视频占位符 (16:9)</p>
            </div>
        </section>

        <section id="articles">
            <h2>文章</h2>
            <article>
                <h3>文章标题一</h3>
                <img src="placeholder-article-1.jpg" alt="文章一图片占位图" class="placeholder-image">
                <p>这里是文章一的摘要。您可以在这里简要介绍文章的主要内容，吸引读者点击阅读更多。替换此文本为您自己的文章摘要。</p>
                <a href="#">阅读更多</a>
            </article>
            <article>
                <h3>文章标题二</h3>
                <img src="placeholder-article-2.jpg" alt="文章二图片占位图" class="placeholder-image">
                <p>这里是文章二的摘要。同上，这里也是对您文章内容的简短介绍。力求言简意赅，引人入胜。</p>
                <a href="#">阅读更多</a>
            </article>
        </section>

        <section id="portfolio">
            <h2>作品展示</h2>
            <div class="portfolio-grid">
                <div class="portfolio-item">
                    <img src="placeholder-portfolio-1.jpg" alt="作品一占位图" class="placeholder-image">
                    <h3>作品一</h3>
                </div>
                <div class="portfolio-item">
                    <img src="placeholder-portfolio-2.jpg" alt="作品二占位图" class="placeholder-image">
                    <h3>作品二</h3>
                </div>
                <div class="portfolio-item">
                    <img src="placeholder-portfolio-3.jpg" alt="作品三占位图" class="placeholder-image">
                    <h3>作品三</h3>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 您的名字. 保留所有权利.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
